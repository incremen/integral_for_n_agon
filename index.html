<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>The Integral n-gon</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});">
  </script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>
</head>
<body>

<header>  
  <h1>The Integral n-gon</h1>
  <p>A regular polygon emerges from pure numerical integration — no geometry tricks.</p>
</header>

<main class="app">
  <section class="top-row">
    <div class="canvas-col">
      <canvas id="canvas"></canvas>
    </div>
    <div class="card controls-card">
      <h2>Controls</h2>
      <div class="slider-group">
        <label>n (Sides) <span id="n-val">6</span></label>
        <input type="range" id="n-slider" min="1" max="30" step="1" value="6">
      </div>
      <div class="slider-group">
        <label>$\theta$ (Sharpness) <span id="theta-val">15</span></label>
        <input type="range" id="theta-slider" min="0" max="300" step="1" value="15">
      </div>
    </div>
  </section>

  <section class="explanation-panel">
    <zero-md src="explanation.md" no-auto-classes>
      <template>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
        <style>
          .markdown-body {
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          }
        </style>
      </template>
    </zero-md>
  </section>
</main>

<script src="math.js"></script>
<script src="app.js"></script>
</body>
</html>
