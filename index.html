<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Integral n-gon</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});">
  </script>
  <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"></script>
</head>
<body>

<header>  
  <h1>The Integral n-gon</h1>
  <p>A regular polygon emerges from pure numerical integration — no geometry tricks.</p>
</header>

<main class="app">
  <section class="canvas-col">
    <canvas id="canvas"></canvas>
  </section>

  <section class="controls-col">
    <div class="card">
      <h2>Controls</h2>
      <div class="slider-group">
        <label>n (Sides) <span id="n-val">6</span></label>
        <input type="range" id="n-slider" min="3" max="15" step="1" value="6">
      </div>
      <div class="slider-group">
        <label>$\theta$ (Sharpness) <span id="theta-val">15</span></label>
        <input type="range" id="theta-slider" min="2" max="300" step="1" value="15">
      </div>
    </div>

    <div class="explanation-panel">
      <zero-md src="explanation.md">
        <template data-merge="append">
          <style>
            .markdown-body {
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
              font-size: 0.9rem;
              line-height: 1.7;
              color: #424245;
            }
            .markdown-body h1 { font-size: 1.25rem; color: #1d1d1f; }
            .markdown-body h3 { font-size: 0.95rem; color: #1d1d1f; margin-top: 1.2em; }
            .markdown-body p { margin-bottom: 0.6em; }
            .markdown-body ul { padding-left: 1.2em; }
            .markdown-body ol { padding-left: 1.2em; }
          </style>
        </template>
      </zero-md>
    </div>
  </section>
</main>

<script src="math.js"></script>
<script src="app.js"></script>
</body>
</html>
