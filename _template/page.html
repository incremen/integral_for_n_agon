<!--
  Starter page for a new interactive function.

  To adapt:
    1. Copy to <name>.html in the repo root.
    2. Update <title> and the <header> blurb + hero equation.
    3. Add/remove slider-group blocks to match the sliders your function needs.
       Each slider needs matching `id="..."` and `<span id="...-val">` targets
       referenced by the config in <name>.js.
    4. Point the zero-md <src>s at your content/<name>_explanation.md
       and content/<name>_proof.md (both optional).
    5. Create js/<name>.js calling createApp({...}).
    6. Swap the final <script src="js/<name>.js"> to match.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>The Integral ???</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});">
  </script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>

<header>
  <div class="hero-equation">
    $$z(x) = \text{your function here}$$
  </div>
  <p>↑ One-line description of what the graph shows.</p>
</header>

<main class="app">
  <section class="top-row">
    <div class="canvas-col">
      <div id="plot"></div>
    </div>
    <div class="card controls-card">
      <h2>Controls</h2>

      <div class="slider-group">
        <label><span>n</span> <span id="n-val">5</span></label>
        <input type="range" id="n-slider" min="1" max="20" step="1" value="5">
      </div>

      <!-- Duplicate slider-group blocks for additional parameters. -->

      <div class="toggle-group">
        <label>
          <input type="checkbox" id="radius-toggle" checked>
          Constant Size
        </label>
      </div>
      <button type="button" id="trace-btn" class="trace-btn">Trace</button>
    </div>
  </section>

  <p class="credit">
    <span>
      <a href="../index.html">← Back to the n-gon</a>
    </span>
  </p>

  <section class="explanation-panel">
    <zero-md src="../content/<name>_explanation.md">
      <template data-merge="append">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
        <style>
          .markdown-body {
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          }
        </style>
      </template>
    </zero-md>
  </section>

  <details class="geometry-details" open>
    <summary>Geometry derivation</summary>
    <div class="geometry-panel">
      <zero-md src="../content/<name>_proof.md">
        <template data-merge="append">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.css">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
          <style>
            .markdown-body {
              background: transparent;
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            }
            .markdown-body img {
              display: block;
              margin: 16px auto;
              max-width: 360px;
              width: 100%;
            }
          </style>
        </template>
      </zero-md>
    </div>
  </details>
</main>

<script src="../js/math.js"></script>
<script src="../js/render.js"></script>
<script src="../js/shared.js"></script>
<script src="../js/<name>.js"></script>
</body>
</html>
